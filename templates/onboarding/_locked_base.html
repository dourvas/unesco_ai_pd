{% load i18n static %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% trans "PROODOS" %}{% endblock %}</title>

    <!-- DaisyUI + Tailwind (mirrors base.html — locked pages stay
         visually consistent with the rest of the platform but strip
         all chrome: navbar, footer, user dropdown, message alerts. -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-base-200 min-h-screen flex items-start justify-center p-4 md:p-8">
    <main class="card bg-base-100 shadow-xl w-full max-w-3xl" role="main">
        <div class="card-body">
            {% block locked_content %}{% endblock %}
        </div>
    </main>
</body>
</html>
