{% load i18n static %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% trans "PROODOS" %}{% endblock %}</title>
    <style>
        /* Locked-page modal: no nav, no footer, centered card.
           Used for compliance gates where the user must acknowledge
           before proceeding (Step 0 AI Disclosure). */
        body.locked-page {
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem 1rem;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                         Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #222;
            line-height: 1.55;
        }
        .locked-card {
            background: #fff;
            max-width: 720px;
            width: 100%;
            padding: 2rem 2.25rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .locked-card h1 {
            margin: 0 0 0.75rem;
            font-size: 1.4rem;
            color: #1f3a93;
        }
        .locked-card .lead {
            font-weight: 600;
            font-size: 1.05rem;
            margin: 0 0 1rem;
        }
        .locked-card ul {
            padding-left: 1.25rem;
        }
        .locked-card ul li {
            margin-bottom: 0.4rem;
        }
        .locked-card .actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .locked-card .btn {
            display: inline-block;
            padding: 0.65rem 1.1rem;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .locked-card .btn-primary {
            background: #1f3a93;
            color: #fff;
        }
        .locked-card .btn-secondary {
            background: #fff;
            color: #1f3a93;
            border-color: #1f3a93;
        }
        .locked-card .secondary-link {
            font-size: 0.9rem;
            margin-top: 1rem;
            text-align: center;
        }
        .locked-card .version-stamp {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #888;
            text-align: right;
        }
        @media (max-width: 480px) {
            .locked-card { padding: 1.25rem; border-radius: 8px; }
            .locked-card .actions .btn { flex: 1 1 auto; text-align: center; }
        }
    </style>
</head>
<body class="locked-page">
    <main class="locked-card" role="main">
        {% block locked_content %}{% endblock %}
    </main>
</body>
</html>
